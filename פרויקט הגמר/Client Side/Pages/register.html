<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>הרשמה</title>

    <link rel="stylesheet" href="../Styles/register.css?v=1">
    <link rel="icon" type="image/png" href="/Assets/favicon.png">

</head>

<body>
    <main class="register-page">
        <section class="register-card">
            <div class="register-header">
                <h1>יצירת חשבון</h1>
                <p>הצטרפו למערכת מדינות העולם</p>
            </div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="fullName">שם מלא</label>

                    <input type="text"
                           id="fullName"
                           name="fullName"
                           placeholder="הכנס שם מלא"
                           autocomplete="name">

                    <span id="fullNameError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="email">כתובת דוא"ל</label>

                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="example@email.com"
                           autocomplete="email">

                    <span id="emailError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="password">סיסמה</label>

                    <div class="password-wrapper">
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="לפחות 8 תווים"
                               autocomplete="new-password">

                        <button type="button"
                                id="togglePassword"
                                class="toggle-password"
                                aria-label="הצג או הסתר סיסמה">
                            הצג
                        </button>
                    </div>

                    <span id="passwordError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">אימות סיסמה</label>

                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="הכנס שוב את הסיסמה"
                           autocomplete="new-password">

                    <span id="confirmPasswordError" class="error-message"></span>
                </div>

                <div id="serverMessage" class="server-message"></div>

                <button type="submit" id="registerButton" class="register-button">
                    הרשמה
                </button>
            </form>

            <p class="login-link">
                כבר יש לך חשבון?
                <a href="login.html">התחבר כאן</a>
            </p>
        </section>
    </main>

<script src="../JS/register.js"></script>
</body>
</html>
